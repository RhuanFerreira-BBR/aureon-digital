name: Diagnose Hostinger FTP

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect candidate directories
        shell: python
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          from ftplib import FTP
          import os

          raw_server = os.environ["FTP_SERVER"].strip()
          username = os.environ["FTP_USERNAME"]
          password = os.environ["FTP_PASSWORD"]
          port = int(os.environ.get("FTP_PORT") or "21")

          server = raw_server.split("://", 1)[-1].split("/", 1)[0].split(":", 1)[0]
          print(f"::add-mask::{server}")
          print(f"::add-mask::{username}")

          candidates = [
              ".",
              "public_html",
              "/public_html",
              "domains",
              "/domains",
              "domains/aureondigital.co",
              "/domains/aureondigital.co",
              "domains/aureondigital.co/public_html",
              "/domains/aureondigital.co/public_html",
              "aureondigital.co/public_html",
              "/aureondigital.co/public_html",
              "www",
              "/www",
              "htdocs",
              "/htdocs",
          ]
          probes = [
              "index.html",
              "robots.txt",
              "sitemap.xml",
              ".nojekyll",
              "assets/index-sKcJUYPJ.js",
              "assets/index-DStVBepy.css",
              "assets/index-CVHSS7bs.js",
              "assets/index-9U-cWKn8.css",
          ]

          def safe_list(ftp):
              try:
                  return sorted(ftp.nlst())[:40]
              except Exception:
                  return []

          def file_info(ftp, name):
              try:
                  size = ftp.size(name)
              except Exception:
                  return None

              modified = ""
              try:
                  modified = ftp.sendcmd(f"MDTM {name}").replace("213 ", "")
              except Exception:
                  pass

              return f"{name} size={size} mdtm={modified}".strip()

          with FTP(timeout=25) as ftp:
              ftp.connect(server, port)
              ftp.login(username, password)
              ftp.voidcmd("TYPE I")
              start_dir = ftp.pwd()

              for candidate in candidates:
                  try:
                      ftp.cwd(start_dir)
                      ftp.cwd(candidate)
                      names = safe_list(ftp)
                      interesting = [
                          item for item in names
                          if item in {"index.html", "robots.txt", "sitemap.xml", ".nojekyll", "assets", "public_html", "domains", "www", "htdocs"}
                      ]
                      print(f"[exists] {candidate}")
                      print(f"  items: {', '.join(interesting) if interesting else '(no tracked items)'}")
                      for probe in probes:
                          info = file_info(ftp, probe)
                          if info:
                              print(f"  {info}")
                  except Exception as exc:
                      print(f"[missing] {candidate} ({exc.__class__.__name__})")
