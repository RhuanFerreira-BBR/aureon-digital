name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Lint
        run: npm run lint

      - name: Visual tests
        run: npm run test:visual

      - name: Build for Hostinger
        run: npm run build

      - name: Install SSH upload tool
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Trust SSH host
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_IP }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$port" -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to Hostinger over SSH
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_IP }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          remote="${SSH_USER}@${SSH_HOST}"
          sshpass -e ssh -p "$port" "$remote" 'pwd; mkdir -p public_html; ls -la public_html | sed -n "1,20p"'
          tar -C dist -czf - . | sshpass -e ssh -p "$port" "$remote" 'tar -xzf - -C public_html'

      - name: Verify Hostinger deploy
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          expected_asset="$(grep -oE '/assets/index-[^"]+\.js' dist/index.html | head -n 1)"
          live_html="$(curl -fsSL -H 'Cache-Control: no-cache' "https://aureondigital.co/?deploy_check=${GITHUB_SHA}" || true)"
          live_asset="$(printf '%s' "$live_html" | grep -oE '/assets/index-[^"]+\.js' | head -n 1 || true)"

          if [ -z "$expected_asset" ] || ! printf '%s' "$live_html" | grep -Fq "$expected_asset"; then
            echo "::warning::Hostinger is not serving the deployed build yet. Expected $expected_asset, got ${live_asset:-none}."
          fi

          if ! curl -fsSI -H 'Cache-Control: no-cache' "https://aureondigital.co/favicon.ico" > /dev/null; then
            echo "::warning::Hostinger is not serving /favicon.ico yet."
          fi

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
