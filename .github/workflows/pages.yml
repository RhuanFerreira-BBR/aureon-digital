name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Lint
        run: npm run lint

      - name: Visual tests
        run: npm run test:visual

      - name: Build for Hostinger
        run: npm run build

      - name: Normalize FTP server
        id: ftp
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          raw="${{ secrets.FTP_SERVER }}"
          server="${raw#*://}"
          server="${server%%/*}"
          server="${server%%:*}"

          if [ -z "$server" ]; then
            echo "FTP_SERVER secret is empty or invalid" >&2
            exit 1
          fi

          echo "::add-mask::$server"
          echo "server=$server" >> "$GITHUB_OUTPUT"

      - name: Deploy to Hostinger
        if: github.ref == 'refs/heads/main'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ steps.ftp.outputs.server }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          local-dir: ./dist/
          server-dir: ./
          state-name: .ftp-deploy-sync-state-aureon.json

      - name: Verify Hostinger deploy
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          expected_asset="$(grep -oE '/assets/index-[^"]+\.js' dist/index.html | head -n 1)"
          live_html="$(curl -fsSL -H 'Cache-Control: no-cache' "https://aureondigital.co/?deploy_check=${GITHUB_SHA}")"
          live_asset="$(printf '%s' "$live_html" | grep -oE '/assets/index-[^"]+\.js' | head -n 1 || true)"

          if [ -z "$expected_asset" ] || ! printf '%s' "$live_html" | grep -Fq "$expected_asset"; then
            echo "Hostinger is not serving the deployed build. Expected $expected_asset, got ${live_asset:-none}." >&2
            exit 1
          fi

          curl -fsSI -H 'Cache-Control: no-cache' "https://aureondigital.co/favicon.ico" > /dev/null

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
