name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Lint
        run: npm run lint

      - name: Visual tests
        run: npm run test:visual

      - name: Build for Hostinger
        run: npm run build

      - name: Install SSH upload tool
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Trust SSH host
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_IP }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          mkdir -p ~/.ssh
          for attempt in 1 2 3; do
            if ssh-keyscan -T 20 -p "$port" -H "$SSH_HOST" >> ~/.ssh/known_hosts; then
              exit 0
            fi
            sleep 5
          done
          echo "Unable to read SSH host key" >&2
          exit 1

      - name: Deploy to Hostinger over SSH
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_IP }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          port="${SSH_PORT:-22}"
          remote="${SSH_USER}@${SSH_HOST}"
          target="$(
            sshpass -e ssh -p "$port" "$remote" '
              found=""
              for file in $(find . -maxdepth 6 -name index.html -type f 2>/dev/null); do
                if grep -q "index-sKcJUYPJ" "$file"; then
                  found="${file%/index.html}"
                  break
                fi
              done

              if [ -n "$found" ]; then
                printf "%s\n" "$found"
              elif [ -d domains/aureondigital.co/public_html ]; then
                printf "%s\n" "domains/aureondigital.co/public_html"
              elif [ -d public_html ]; then
                printf "%s\n" "public_html"
              else
                printf "%s\n" "."
              fi
            '
          )"
          printf 'Hostinger SSH deploy target: %s\n' "$target"
          printf -v target_q '%q' "$target"
          sshpass -e ssh -p "$port" "$remote" "mkdir -p $target_q; ls -la $target_q | sed -n '1,20p'"
          tar -C dist -czf - . | sshpass -e ssh -p "$port" "$remote" "tar -xzf - -C $target_q"

      - name: Verify Hostinger deploy
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          expected_asset="$(grep -oE '/assets/index-[^"]+\.js' dist/index.html | head -n 1)"
          live_html="$(curl -fsSL -H 'Cache-Control: no-cache' "https://aureondigital.co/?deploy_check=${GITHUB_SHA}" || true)"
          live_asset="$(printf '%s' "$live_html" | grep -oE '/assets/index-[^"]+\.js' | head -n 1 || true)"

          if [ -z "$expected_asset" ] || ! printf '%s' "$live_html" | grep -Fq "$expected_asset"; then
            echo "::warning::Hostinger is not serving the deployed build yet. Expected $expected_asset, got ${live_asset:-none}."
          fi

          if ! curl -fsSI -H 'Cache-Control: no-cache' "https://aureondigital.co/favicon.ico" > /dev/null; then
            echo "::warning::Hostinger is not serving /favicon.ico yet."
          fi

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: Test GitHub Pages subpath
        env:
          GITHUB_PAGES: 'true'
        run: npx playwright test tests/smoke.spec.ts -g "Pages subpath case media" --project=chromium-desktop --workers=1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
