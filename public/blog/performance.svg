<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="performance-title performance-desc">
  <title id="performance-title">Core Web Vitals metric arcs</title>
  <desc id="performance-desc">Three blue metric arcs represent LCP, INP and CLS as connected parts of a fast page experience.</desc>
  <defs>
    <pattern id="performance-grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#d4a017" stroke-opacity=".14" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="#08090f"/>
  <rect width="1600" height="900" fill="url(#performance-grid)"/>
  <text x="120" y="145" fill="#d4a017" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="5">PAGE EXPERIENCE</text>
  <text x="120" y="215" fill="#f4f0e8" font-family="Arial, sans-serif" font-size="58" font-weight="700">Speed is part of the experience.</text>
  <path d="M250 705A220 220 0 0 1 690 705" fill="none" stroke="#f4f0e8" stroke-opacity=".12" stroke-linecap="round" stroke-width="32"/>
  <path d="M250 705A220 220 0 0 1 627 549" fill="none" stroke="#4A90E2" stroke-linecap="round" stroke-width="32"/>
  <path d="M580 705A220 220 0 0 1 1020 705" fill="none" stroke="#f4f0e8" stroke-opacity=".12" stroke-linecap="round" stroke-width="32"/>
  <path d="M580 705A220 220 0 0 1 935 529" fill="none" stroke="#4A90E2" stroke-linecap="round" stroke-width="32"/>
  <path d="M910 705A220 220 0 0 1 1350 705" fill="none" stroke="#f4f0e8" stroke-opacity=".12" stroke-linecap="round" stroke-width="32"/>
  <path d="M910 705A220 220 0 0 1 1283 545" fill="none" stroke="#4A90E2" stroke-linecap="round" stroke-width="32"/>
  <g fill="#08090f" stroke="#4A90E2" stroke-width="5">
    <circle cx="470" cy="705" r="86"/>
    <circle cx="800" cy="705" r="86"/>
    <circle cx="1130" cy="705" r="86"/>
  </g>
  <g fill="#f4f0e8" font-family="Arial, sans-serif" font-size="38" font-weight="700" letter-spacing="3" text-anchor="middle">
    <text x="470" y="718">LCP</text>
    <text x="800" y="718">INP</text>
    <text x="1130" y="718">CLS</text>
  </g>
  <g fill="#4A90E2">
    <circle cx="627" cy="549" r="13"/>
    <circle cx="935" cy="529" r="13"/>
    <circle cx="1283" cy="545" r="13"/>
  </g>
  <path d="M470 325v78m330-78v78m330-78v78" stroke="#d4a017" stroke-width="3"/>
  <g fill="#d4a017" font-family="Arial, sans-serif" font-size="17" font-weight="700" letter-spacing="2" text-anchor="middle">
    <text x="470" y="305">LOADING</text>
    <text x="800" y="305">RESPONSE</text>
    <text x="1130" y="305">STABILITY</text>
  </g>
</svg>
